<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>创作者社区 - 管理后台</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const isLocalHost = ['localhost', '127.0.0.1', '::1'].includes(location.hostname)
      const appBase = location.pathname.startsWith('/creator-community-admin/') ? '/creator-community-admin/' : '/'
      const script = document.createElement('script')
      script.type = 'module'

      if (isLocalHost) {
        script.src = `${appBase}src/main.tsx`
      } else {
        const assetVersion = '01b8389'
        const link = document.createElement('link')
        link.rel = 'stylesheet'
        link.href = `/creator-community-admin/assets/main.css?v=${assetVersion}`
        document.head.appendChild(link)

        script.src = `/creator-community-admin/assets/main.js?v=${assetVersion}`
      }

      document.head.appendChild(script)
    </script>
  </body>
</html>
